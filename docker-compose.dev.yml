version: "3.9"

services:
  fidelity-validator:
    build:
      context: .
      target: runtime
    image: aumos/fidelity-validator:dev
    ports:
      - "8012:8000"
    environment:
      AUMOS_SERVICE_NAME: aumos-fidelity-validator
      AUMOS_DATABASE__URL: postgresql+asyncpg://aumos:aumos@postgres:5432/aumos_fidelity
      AUMOS_KAFKA__BOOTSTRAP_SERVERS: kafka:9092
      AUMOS_REDIS__URL: redis://redis:6379/0
      AUMOS_MINIO__ENDPOINT: minio:9000
      AUMOS_MINIO__ACCESS_KEY: minioadmin
      AUMOS_MINIO__SECRET_KEY: minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./src:/app/src

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aumos
      POSTGRES_PASSWORD: aumos
      POSTGRES_DB: aumos_fidelity
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aumos -d aumos_fidelity"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - fidelity_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6385:6379"

  kafka:
    image: bitnami/kafka:3.6
    ports:
      - "9099:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER

  minio:
    image: minio/minio:latest
    ports:
      - "9010:9000"
      - "9011:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - fidelity_minio_data:/data

volumes:
  fidelity_postgres_data:
  fidelity_minio_data:
